apiVersion: 1

datasources:
  - name: Loki
    uid: Loki
    type: loki
    access: proxy
    url: http://loki:3100
    isDefault: false
    editable: false
    jsonData:
      derivedFields:
        - datasourceUid: Tempo
          matcherRegex: '"trace_id":"([a-f0-9]{32})"'
          name: trace_id
          url: "$${__value.raw}"
          urlDisplayLabel: Tempo trace
