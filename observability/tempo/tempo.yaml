# Local/dev default: TEMPO_STORAGE_BACKEND=local (compose env default); WAL stays on disk.
# Prod: TEMPO_STORAGE_BACKEND=s3 with TEMPO_S3_* (AWS S3 or standalone MinIO/S3-compatible API).
# Do not use MinIO Gateway.

server:
  http_listen_port: 3200

distributor:
  receivers:
    otlp:
      protocols:
        grpc:
          endpoint: 0.0.0.0:4317

ingester:
  max_block_duration: 5m

compactor:
  compaction:
    block_retention: 168h

storage:
  trace:
    backend: ${TEMPO_STORAGE_BACKEND:-local}
    wal:
      path: /var/tempo/wal
    local:
      path: /var/tempo/blocks
    s3:
      bucket: ${TEMPO_S3_BUCKET:-}
      endpoint: ${TEMPO_S3_ENDPOINT:-}
      region: ${TEMPO_S3_REGION:-eu-central-1}
      access_key: ${TEMPO_S3_ACCESS_KEY:-}
      secret_key: ${TEMPO_S3_SECRET_KEY:-}
      insecure: ${TEMPO_S3_INSECURE:-false}
      forcepathstyle: ${TEMPO_S3_FORCE_PATH_STYLE:-false}
