# See prometheus.yml for remote-write and tenant metric label policy.

global:
  scrape_interval: 30s
  evaluation_interval: 30s
  external_labels:
    env: onprem
    service: planvault

rule_files:
  - /etc/prometheus/rules.yml

scrape_configs:
  - job_name: planvault-api
    metrics_path: /metrics
    static_configs:
      - targets: ["api:8088"]

  - job_name: planvault-jobs
    metrics_path: /metrics
    static_configs:
      - targets: ["jobs:8088"]

  - job_name: litellm
    metrics_path: /metrics
    static_configs:
      - targets: ["litellm:4000"]

  - job_name: node-exporter
    static_configs:
      - targets: ["node_exporter:9100"]

  - job_name: cadvisor
    static_configs:
      - targets: ["cadvisor:8080"]
