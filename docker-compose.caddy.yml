# Optional managed HTTPS overlay using Caddy.
#
# Typical use:
#   HTTP_PORT=8080
#   CADDY_SITE_ADDRESS=https://planvault.example.com
#   docker compose --env-file .env -f docker-compose.yml -f docker-compose.caddy.yml up -d
#
# Caddy must bind public ports 80/443 for ACME HTTP/TLS challenges. Set HTTP_PORT
# away from 80 so the base edge service does not conflict with Caddy on the host.

volumes:
  caddy_data:
  caddy_config:

services:
  caddy:
    image: caddy:2.8-alpine
    restart: unless-stopped
    mem_limit: 128m
    memswap_limit: 128m
    read_only: true
    security_opt:
      - no-new-privileges:true
    tmpfs:
      - /tmp
    ports:
      - "${CADDY_HTTP_PORT:-80}:80"
      - "${CADDY_HTTPS_PORT:-443}:443"
    environment:
      CADDY_SITE_ADDRESS: ${CADDY_SITE_ADDRESS:-https://localhost}
    volumes:
      - ./caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    networks:
      - planvault
    depends_on:
      edge:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "caddy", "validate", "--config", "/etc/caddy/Caddyfile", "--adapter", "caddyfile"]
      interval: 30s
      timeout: 5s
      retries: 3
